version: "3.8"

services:
  redis:
    image: redis:latest
    container_name: redis-rss
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_MAXMEMORY=256mb

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander-rss
    depends_on:
      - redis
    ports:
      - "8081:8081"
    environment:
      # The format is label:hostname:port
      - REDIS_HOSTS=local:redis:6379

  database:
    image: postgres:latest
    container_name: database
    ports:
      - "5432:5432"
    volumes:
      # Fix: Mount to /var/lib/postgresql instead of /data
      - database_data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=docker
      - POSTGRES_USER=docker
      - POSTGRES_DB=rss-reader

volumes:
  redis_data:
  database_data: